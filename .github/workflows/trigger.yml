name: Run Related Tests on PR

on:
  # Triggers when a Pull Request is opened or updated targeting the 'main' branch
  pull_request:
    branches:
      - main

jobs:
  test-changed-files:
    name: Test Changed Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # CRITICAL: fetch-depth 0 is required! 
          # Playwright needs the full git history to compare your branch against main.
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Run ONLY the tests affected by the files changed in this PR
      - name: Run related Playwright tests
        run: npx playwright test --only-changed=origin/$GITHUB_BASE_REF

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7